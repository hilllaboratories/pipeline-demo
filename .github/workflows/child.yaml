name: Child
run-name: "Deploying to ${{ inputs.environment }} by @${{ github.actor }}"

on:
  workflow_call:
    inputs:
      environment:
        description: 'Target environment'
        type: string
        required: true
        default: 'staging'

jobs:
  build:
    runs-on: ubuntu-slim
    steps:
      - name: Build
        run: echo "Building the application"
  deploy:
    needs: build
    runs-on: ubuntu-slim
    environment:
      name: ${{ inputs.environment }}
    steps:
      - name: Deploy
        run: echo "Deploying the application"
        
